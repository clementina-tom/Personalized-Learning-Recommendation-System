name: Auto Unzip

on:
  push:
    paths:
      - '*.zip'

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      # ... the rest stays the same
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip all zip files
        run: |
          for zipfile in *.zip; do
            if [ -f "$zipfile" ]; then
              folder="${zipfile%.zip}"
              unzip -qq "$zipfile" -d "$folder"
              rm "$zipfile"
            fi
          done

      - name: Commit unzipped files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-unzip files"
          git push
