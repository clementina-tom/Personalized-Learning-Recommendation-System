name: Auto Unzip

on:
  push:
    paths:
      - '*.zip'

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Get full history

      - name: Unzip and flatten safely
        run: |
          for zipfile in *.zip; do
            if [ -f "$zipfile" ]; then
              temp_dir="${zipfile%.zip}_temp"
              unzip -qq "$zipfile" -d "$temp_dir"
              
              # Count items in temp_dir
              items=($(ls -A "$temp_dir"))
              if [ ${#items[@]} -eq 1 ] && [ -d "$temp_dir/${items[0]}" ]; then
                inner="$temp_dir/${items[0]}"
                # Move everything except .github to root
                for item in "$inner"/* "$inner"/.[!.]*; do
                  [ -e "$item" ] || continue
                  base=$(basename "$item")
                  if [ "$base" != ".github" ]; then
                    mv -n "$item" . 2>/dev/null || true
                  fi
                done
                # Merge .github folder instead of replacing
                if [ -d "$inner/.github" ]; then
                  mkdir -p .github
                  cp -r "$inner/.github/"* .github/ 2>/dev/null || true
                fi
              else
                # Similar for multiple items
                for item in "$temp_dir"/* "$temp_dir"/.[!.]*; do
                  [ -e "$item" ] || continue
                  base=$(basename "$item")
                  if [ "$base" != ".github" ]; then
                    mv -n "$item" . 2>/dev/null || true
                  fi
                done
                if [ -d "$temp_dir/.github" ]; then
                  mkdir -p .github
                  cp -r "$temp_dir/.github/"* .github/ 2>/dev/null || true
                fi
              fi
              
              rm -rf "$temp_dir"
              rm "$zipfile"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet --cached || git commit -m "Unzip and flatten (safe)"
          git push
